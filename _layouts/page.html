---
layout: default
---
<section class="content-page">
  <header class="page-header">
    <h1>
      {% assign title_parts = page.title | split: "・" %}
      {{ title_parts[0] }}
      {% if title_parts.size > 1 %}
        <span class="page-title-japanese">・{{ title_parts[1] }}</span>
      {% endif %}
    </h1>
    {% if page.intro %}
      <p class="page-intro">{{ page.intro }}</p>
    {% endif %}
  </header>

  <div class="page-body">
    {{ content }}
  </div>
</section>
