<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https://res.cloudinary.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self'; form-action https://formsubmit.co; upgrade-insecure-requests">
    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Lato:wght@300;400;500;700&family=Libre+Baskerville:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body class="{% if page.url == '/' %}home-page{% endif %}">
    <div class="site-shell">
      <header class="site-header">
        <div class="header-band">
          <a class="brand" href="{{ '/' | relative_url }}">
            <span class="brand-mark">OS</span>
            <span>
              <strong>{{ site.title }}</strong>
              <small>{{ site.subtitle }}</small>
            </span>
          </a>
        </div>

        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
          <a href="{{ '/travel-log/' | relative_url }}" {% if page.url == '/travel-log/' %}aria-current="page"{% endif %}>Travel Log</a>
          <a href="{{ '/cv/' | relative_url }}" {% if page.url == '/cv/' %}aria-current="page"{% endif %}>CV</a>
          <a href="{{ '/testimonials/' | relative_url }}" {% if page.url == '/testimonials/' %}aria-current="page"{% endif %}>Testimonials</a>
          <a href="{{ '/contact/' | relative_url }}" {% if page.url == '/contact/' %}aria-current="page"{% endif %}>Contact</a>
        </nav>
      </header>

      <main class="page-content">
        {{ content }}
      </main>

      <div class="lightbox" id="site-lightbox" hidden>
        <button class="lightbox-close" type="button" aria-label="Close image viewer">&times;</button>
        <div class="lightbox-backdrop" data-lightbox-close="true"></div>
        <figure class="lightbox-figure">
          <img class="lightbox-image" src="" alt="">
        </figure>
      </div>

      <footer class="site-footer">
        <p>Travel planning by {{ site.title }}.</p>
      </footer>
    </div>
    <script>
      (function () {
        var lightbox = document.getElementById("site-lightbox");
        if (!lightbox) return;

        var lightboxImage = lightbox.querySelector(".lightbox-image");
        var closeButton = lightbox.querySelector(".lightbox-close");
        var lastActiveTrigger = null;

        function openLightbox(trigger) {
          var image = trigger.querySelector("img");
          if (!image) return;

          lastActiveTrigger = trigger;
          lightboxImage.src = trigger.getAttribute("href");
          lightboxImage.alt = image.getAttribute("alt") || "";
          lightbox.hidden = false;
          document.body.classList.add("lightbox-open");
          closeButton.focus();
        }

        function closeLightbox() {
          lightbox.hidden = true;
          lightboxImage.src = "";
          lightboxImage.alt = "";
          document.body.classList.remove("lightbox-open");
          if (lastActiveTrigger) lastActiveTrigger.focus();
        }

        document.addEventListener("click", function (event) {
          var trigger = event.target.closest(".thumb-link, .gallery-link");
          if (trigger) {
            event.preventDefault();
            openLightbox(trigger);
            return;
          }

          if (event.target.closest("[data-lightbox-close='true']") || event.target.closest(".lightbox-close")) {
            closeLightbox();
          }
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape" && !lightbox.hidden) {
            closeLightbox();
          }
        });
      })();
    </script>
  </body>
</html>
